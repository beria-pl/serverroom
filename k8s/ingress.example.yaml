apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: serverroom
  namespace: serverroom
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: serverroom.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: serverroom-app
                port:
                  number: 80

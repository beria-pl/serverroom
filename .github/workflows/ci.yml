name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q backend/app

      - name: Build and start Docker stack
        run: |
          docker compose up --build -d

      - name: Smoke test app endpoint
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /tmp/sr_home.html -w "%{http_code}" http://127.0.0.1:8000/ || true)
            if [ "$code" = "200" ]; then
              grep -q "Serverroom Visualizer" /tmp/sr_home.html
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          docker compose ps
          docker compose logs --no-color --tail=120 app
          exit 1

      - name: Stop Docker stack
        if: always()
        run: docker compose down --remove-orphans
